# OOTD-AI Production Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.8"

services:
    # Disable development ports in production
    postgres:
        restart: unless-stopped
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U fashion_user -d fashion_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        restart: unless-stopped
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        restart: unless-stopped
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        restart: unless-stopped
        environment:
            - DEBUG=false
            - ENVIRONMENT=production
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    frontend:
        restart: unless-stopped
        # In production, frontend is served by Nginx, not this container
        profiles:
            - dev

    # Nginx reverse proxy (production)
    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./ssl:/etc/letsencrypt:ro  # SSL certificates
            - ./uploads:/app/uploads:ro   # Uploaded images
        depends_on:
            - frontend
            - backend
        restart: unless-stopped
        profiles:
            - prod

    # Prometheus monitoring
    prometheus:
        image: prom/prometheus:latest
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        ports:
            - "9090:9090"
        restart: unless-stopped
        profiles:
            - monitoring

    # Grafana dashboards
    grafana:
        image: grafana/grafana:latest
        volumes:
            - grafana_data:/var/lib/grafana
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
        restart: unless-stopped
        profiles:
            - monitoring
        depends_on:
            - prometheus

volumes:
    postgres_data:
    redis_data:
    minio_data:
    prometheus_data:
    grafana_data: