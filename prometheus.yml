# Prometheus configuration for OOTD-AI

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_alertmanagers:
        - targets: []

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Backend metrics
  - job_name: 'ootd-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Frontend metrics (if exposed)
  - job_name: 'ootd-frontend'
    static_configs:
      - targets: ['frontend:3000']
    scrape_interval: 60s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']